services:
  - type: web
    name: bluesparrow-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: WEBAUTHN_RP_ID
        sync: false
      - key: WEBAUTHN_ORIGIN
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      # ─── NSE MF NMF II ────────────────────────────────────
      - key: NSE_SANDBOX
        value: "false"
      - key: NSE_MEMBER_ID
        sync: false
      - key: NSE_USER_ID
        sync: false
      - key: NSE_PASSWORD
        sync: false
      - key: NSE_LICENSE_KEY
        sync: false
      - key: NSE_AMC_CODE
        sync: false
      - key: NSE_API_URL
        sync: false
